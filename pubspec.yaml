name: dart_2_party_ecdsa
description: "A new Flutter FFI plugin project."
version: 0.0.1
homepage:

environment:
  sdk: ^3.11.0
  flutter: '>=3.3.0'

dependencies:
  async: ^2.13.0
  collection: ^1.19.1
  convert: ^3.1.2
  flutter:
    sdk: flutter
  hashlib: ^2.3.0
